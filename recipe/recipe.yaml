schema_version: 1

context:
  version: "0.2.1"

package:
  name: fps-file-watcher
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/f/fps-file-watcher/fps_file_watcher-${{ version }}.tar.gz
  sha256: e37774b499cdc611920d318ce6d9f10eb22067e50644179efb2d010429176bc6

build:
  number: 0
  noarch: python
  script:
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - uv-build
  run:
    - python >=${{ python_min }}
    - anyio
    - fps
    - jupyverse-file-watcher >=0.1.0,<0.2.0
    - structlog
    - watchfiles >=1.0.4,<2

tests:
  - python:
      imports:
        - fps_file_watcher
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: An FPS plugin for the file watcher API
  description: An FPS plugin for the file watcher API
  license: BSD-3-Clause
  license_file: COPYING.md
  homepage: https://github.com/jupyter-server/jupyverse/tree/main/plugins/file_watcher

extra:
  recipe-maintainers:
    - davidbrochart
